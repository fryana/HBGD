<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday :)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at 60% 40%,#2a0a5e 0%,#0d0820 55%,#050310 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ── STARS ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,2s) infinite alternate}
@keyframes twinkle{from{opacity:.15}to{opacity:1}}

/* ── SCENE ── */
#scene{position:relative;width:440px;height:520px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;z-index:1}

/* ── HAPPY BIRTHDAY ── */
#hbd{
  position:absolute;bottom:285px;top:auto;width:100%;text-align:center;
  font-family:'Mistral','Brush Script MT',cursive;font-size:52px;font-weight:400;
  letter-spacing:1px;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b9d,#ffd93d);
  background-size:300%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;transform:scale(.2) rotate(-12deg);
  transition:opacity .9s,transform .9s cubic-bezier(.34,1.56,.64,1);
  animation:hbdGrad 4s linear infinite;
  filter:drop-shadow(0 2px 12px rgba(255,150,50,.5));
  z-index:30;pointer-events:none;
}
#hbd.show{opacity:1;transform:scale(1) rotate(0deg)}
@keyframes hbdGrad{0%{background-position:0%}100%{background-position:300%}}

/* ── STITCH ── */
#stitch{
  position:absolute;bottom:18px;opacity:0;
  transform:scale(0) translateY(70px);
  transition:opacity .7s,transform .8s cubic-bezier(.34,1.56,.64,1);
  z-index:20;filter:drop-shadow(0 14px 28px rgba(0,100,220,.45));
}
#stitch.show{opacity:1;transform:scale(1) translateY(0)}

/* ── WIND ── */
#wind{position:fixed;inset:0;pointer-events:none;z-index:50;display:none;overflow:hidden}
.wl{
  position:absolute;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.75) 40%,rgba(200,230,255,.5),transparent);
  border-radius:2px;animation:wblow var(--wd,.7s) ease-in-out forwards
}
@keyframes wblow{0%{left:-300px;opacity:0}15%{opacity:1}85%{opacity:.8}100%{left:110%;opacity:0}}

/* ── SVG FLAME animation ── */
@keyframes svgFlicker{
  0%  {transform:scaleX(1)   scaleY(1)    rotate(-4deg)}
  25% {transform:scaleX(.82) scaleY(1.12) rotate(4deg)}
  50% {transform:scaleX(1.12)scaleY(.9)  rotate(-2deg)}
  75% {transform:scaleX(.9)  scaleY(1.1)  rotate(3deg)}
  100%{transform:scaleX(.95) scaleY(1.06) rotate(-4deg)}
}
.svgFlicker{
  transform-box:fill-box;transform-origin:center bottom;
  animation:svgFlicker .28s ease-in-out infinite alternate;
}
@keyframes svgGlow{
  from{opacity:.45;transform:scale(1)}
  to  {opacity:.9; transform:scale(1.35)}
}
.svgGlow{transform-box:fill-box;transform-origin:center center;
  animation:svgGlow .4s ease-in-out infinite alternate}

/* ── SVG Crumble & Smoke ── */
  60% {transform:translateY(var(--fallY)) rotate(var(--tilt));opacity:.8}
  100%{transform:translateY(calc(var(--fallY)*1.8)) rotate(var(--tilt));opacity:0}
}
  100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0}
}
@keyframes cakeSlideL{
  0%  {transform:translateX(0) rotate(0deg)}
  100%{transform:translateX(-82px) rotate(-7deg)}
}
@keyframes cakeSlideR{
  0%  {transform:translateX(0) rotate(0deg)}
  100%{transform:translateX(82px) rotate(7deg)}
}
@keyframes svgSmoke{
  0%  {transform:translate(0,0) scale(.5);opacity:.7}
  100%{transform:translate(var(--sx,8px),-85px) scale(2.4);opacity:0}
}

/* ── CONFETTI ── */
.cf{
  position:fixed;top:-14px;border-radius:2px;pointer-events:none;z-index:100;
  animation:cfall var(--cd,3s) linear var(--delay,0s) forwards
}
@keyframes cfall{
  0%  {transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(var(--cr2,360deg));opacity:.1}
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="wind"></div>

<div id="scene">
  <div id="hbd">Happy Birthday :)</div>

<script>
// ── Stars ──
const starsEl=document.getElementById('stars');
for(let i=0;i<90;i++){
  const s=document.createElement('div');s.className='star';
  const sz=(Math.random()*2.5+.5).toFixed(1);
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*2+.8).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── Init cake decorations ──
function initCake(){
  const NS='http://www.w3.org/2000/svg';
  const sprG=document.getElementById('sprinkles');
  const rosG=document.getElementById('rosettes');
  const sc=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#ff8c00','#c084fc','#00d4ff','#fff'];

  // Sprinkle belt: y 395–445, x 52–388
  for(let i=0;i<160;i++){
    const x=58+Math.random()*324;
    const y=396+Math.random()*42;
    if(Math.pow((x-220)/176,2)+Math.pow((y-434)/24,2)>1.05) continue;
    const el=document.createElementNS(NS,'ellipse');
    const rx=3.5+Math.random()*4.5,ry=2+Math.random()*3;
    const rot=Math.random()*180;
    el.setAttribute('cx',x);el.setAttribute('cy',y);
    el.setAttribute('rx',rx);el.setAttribute('ry',ry);
    el.setAttribute('transform',`rotate(${rot},${x},${y})`);
    el.setAttribute('fill',sc[Math.floor(Math.random()*sc.length)]);
    sprG.appendChild(el);
  }

  // Frosting rosettes along top ellipse (14 pink + 4 accent)
  const pinkCol='#ff85c2';
  const accCols=['#4dc8ff','#ffd93d','#4dc8ff','#ffd93d'];
  const totalRos=18;
  for(let i=0;i<totalRos;i++){
    const ang=(i/totalRos)*Math.PI*2;
    const ex=220+Math.cos(ang)*155;
    const ey=262+Math.sin(ang)*24;
    const isAcc=(i%4===1||i%4===3)&&i>3;
    const col=isAcc?accCols[Math.floor(i/4)%4]:pinkCol;
    const rosG2=document.createElementNS(NS,'g');
    // 5 petals + center
    for(let j=0;j<5;j++){
      const pa=(j/5)*Math.PI*2;
      const c=document.createElementNS(NS,'ellipse');
      c.setAttribute('cx',ex+Math.cos(pa)*7);c.setAttribute('cy',ey+Math.sin(pa)*5.5);
      c.setAttribute('rx',9);c.setAttribute('ry',8);c.setAttribute('fill',col);
      rosG2.appendChild(c);
    }
    const cen=document.createElementNS(NS,'circle');
    cen.setAttribute('cx',ex);cen.setAttribute('cy',ey);cen.setAttribute('r',7.5);cen.setAttribute('fill',col);
    rosG2.appendChild(cen);
    rosG.appendChild(rosG2);
  }

  // Polka dots inside candle numbers
  const dc=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#c084fc','#ff8c00'];
  const d2G=document.getElementById('dots-2');
  const d4G=document.getElementById('dots-4');

  // "2" glyph approx bounds: x 58–200, y 128–254
  [[78,165],[98,145],[115,205],[138,178],[152,148],[88,230],[125,218],[158,195],
   [72,195],[145,225],[105,168],[135,145],[82,244],[158,162],[108,243]].forEach(([x,y])=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',x+(Math.random()*8-4));c.setAttribute('cy',y+(Math.random()*8-4));
    c.setAttribute('r',5.5+Math.random()*3.5);
    c.setAttribute('fill',dc[Math.floor(Math.random()*dc.length)]);
    d2G.appendChild(c);
  });

  // "4" glyph approx bounds: x 238–388, y 128–254
  [[255,148],[278,174],[298,148],[325,186],[352,158],[368,204],
   [252,204],[272,226],[304,168],[335,220],[360,172],[285,248],[345,244],[262,168],[322,148]].forEach(([x,y])=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',x+(Math.random()*8-4));c.setAttribute('cy',y+(Math.random()*8-4));
    c.setAttribute('r',5.5+Math.random()*3.5);
    c.setAttribute('fill',dc[Math.floor(Math.random()*dc.length)]);
    d4G.appendChild(c);
  });
}

// ── Wind ──
function doWind(){
  const w=document.getElementById('wind');w.style.display='block';
  for(let i=0;i<22;i++) setTimeout(()=>{
    const l=document.createElement('div');l.className='wl';
    const wd=(Math.random()*.5+.5).toFixed(2);
    l.style.cssText=`width:${Math.random()*220+80}px;top:${Math.random()*78+8}%;--wd:${wd}s`;
    w.appendChild(l);setTimeout(()=>l.remove(),950);
  },i*60);
}

// ── Blow candles ──
function blowCandles(){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.getElementById('cake-svg');
  [['flame2',127,100],['flame4',318,100]].forEach(([id,wx,wy],i)=>{
    setTimeout(()=>{
      const f=document.getElementById(id);
      f.style.cssText='transition:opacity .35s,transform .35s;transform-origin:center bottom;transform:translateX(55px) scaleY(0);opacity:0';
      // smoke puffs
      for(let j=0;j<5;j++) setTimeout(()=>{
        const sm=document.createElementNS(NS,'circle');
        const sx=(Math.random()*20-8).toFixed(0);
        sm.setAttribute('cx',wx+(Math.random()*10-5));sm.setAttribute('cy',wy);
        sm.setAttribute('r',6+j*2);sm.setAttribute('fill','rgba(190,190,190,.6)');
        sm.style.cssText=`transform-box:fill-box;transform-origin:center center;--sx:${sx}px;animation:svgSmoke 1.6s ${j*.18}s ease-out forwards`;
        svg.appendChild(sm);setTimeout(()=>sm.remove(),2400);
      },j*70+80);
    },i*320);
  });
}

// ── Split cake ──
function crumbleCake(){
  const svg=document.getElementById('cake-svg');
  const scene=document.getElementById('scene');

  // Get SVG position relative to scene
  const svgR=svg.getBoundingClientRect();
  const scR=scene.getBoundingClientRect();
  const svgTop=svgR.top-scR.top;
  const svgLeft=svgR.left-scR.left;
  const W=svgR.width, H=svgR.height;
  const halfW=W/2;

  // Build a half-clone: a clipped div containing a full SVG clone
  function makeHalf(side){
    const wrap=document.createElement('div');
    wrap.style.cssText=
      'position:absolute;overflow:hidden;pointer-events:none;z-index:15;'+
      'width:'+halfW+'px;height:'+H+'px;'+
      'top:'+svgTop+'px;'+
      (side==='left'?'left:'+svgLeft+'px;':'left:'+(svgLeft+halfW)+'px;')+
      'transform-origin:'+(side==='left'?'right bottom':'left bottom')+';';

    const clone=svg.cloneNode(true);
    clone.removeAttribute('id');
    clone.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
    clone.style.cssText=
      'position:absolute;top:0;'+
      (side==='left'?'left:0;':'left:-'+halfW+'px;')+
      'width:'+W+'px;height:'+H+'px;overflow:visible;display:block;';
    wrap.appendChild(clone);
    scene.appendChild(wrap);
    return wrap;
  }

  const leftHalf=makeHalf('left');
  const rightHalf=makeHalf('right');

  // Hide original SVG
  svg.style.opacity='0';

  // Animate halves open
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const ease='cubic-bezier(.25,1,.5,1)';
    leftHalf.style.transition='transform .95s '+ease;
    leftHalf.style.transform='translateX(-82px) rotate(-7deg)';
    rightHalf.style.transition='transform .95s '+ease;
    rightHalf.style.transform='translateX(82px) rotate(7deg)';
  }));
}


// ── Confetti ──
function confetti(){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#c084fc','#ffa500','#00e5ff'];
  for(let i=0;i<75;i++) setTimeout(()=>{
    const p=document.createElement('div');p.className='cf';
    const sz=Math.random()*10+5;
    const cd=(Math.random()*2.5+2).toFixed(1);
    const cr2=Math.floor(Math.random()*1440-720);
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;`+
      `background:${cols[Math.floor(Math.random()*cols.length)]};`+
      `border-radius:${Math.random()>.4?'50%':'3px'};`+
      `--cd:${cd}s;--cr2:${cr2}deg;--delay:${(Math.random()*2).toFixed(1)}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(parseFloat(cd)+3)*1000);
  },i*35);
}
